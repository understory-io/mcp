name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: understory-mcp

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --draft --title "${{ steps.tag.outputs.tag }}" --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar czf ${BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release ${BINARY_NAME}

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" `
            -DestinationPath "${env:BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.zip"

      - name: Generate checksum (unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 ${BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz > ${BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz.sha256

      - name: Generate checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${env:BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          $file = "${env:BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.zip"
          "$hash  $file" | Out-File -Encoding ascii "${file}.sha256"

      - name: Upload to release (unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            ${BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz \
            ${BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload to release (windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" `
            "${env:BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.zip" `
            "${env:BINARY_NAME}-${{ needs.create-release.outputs.tag }}-${{ matrix.target }}.zip.sha256"

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false

  update-homebrew:
    needs: [create-release, publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          gh release download "${TAG}" --repo "${{ github.repository }}" --pattern "*.sha256" --dir checksums

      - name: Generate formula
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          get_sha() {
            grep "$1" checksums/*.sha256 | awk '{print $1}'
          }

          SHA_DARWIN_ARM=$(get_sha "aarch64-apple-darwin")
          SHA_LINUX_AMD=$(get_sha "x86_64-unknown-linux-gnu")
          SHA_LINUX_ARM=$(get_sha "aarch64-unknown-linux-gnu")

          cat > understory-mcp.rb << FORMULA
          class UnderstoryMcp < Formula
            desc "MCP server for the Understory API"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/${TAG}/${BINARY_NAME}-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/${TAG}/${BINARY_NAME}-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/${TAG}/${BINARY_NAME}-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_AMD}"
              end
            end

            def install
              bin.install "${BINARY_NAME}"
            end
          end
          FORMULA

      - name: Configure SSH
        env:
          HB_GITHUB_SSH_KEY: ${{ secrets.HB_GITHUB_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${HB_GITHUB_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to homebrew-tap
        run: |
          git clone git@github.com:understory-io/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp understory-mcp.rb tap/Formula/understory-mcp.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/understory-mcp.rb
          git commit -m "Update understory-mcp to ${{ needs.create-release.outputs.tag }}"
          git push
